openapi: 3.0.0
info:
  title: Padel Tournament API
  version: 1.1.0
  description: "API para la gestión integral de un torneo único de Pádel, desde la precarga de equipos hasta la visualización de llaves eliminatorias."
servers:
  - url: http://localhost:3001
    description: Servidor de desarrollo local
paths:
  /api/teams:
    post:
      summary: Precargar un nuevo equipo
      tags:
        - Equipos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreloadTeamRequest"
      responses:
        "201":
          description: "Equipo creado exitosamente."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamResponse"
    get:
      summary: Obtener todos los equipos precargados
      tags:
        - Equipos
      responses:
        "200":
          description: "Lista de equipos obtenida con éxito."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamResponse"
  /api/teams/{id}:
    put:
      summary: Actualizar un equipo
      tags:
        - Equipos
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamRequest"
      responses:
        "200":
          description: "Equipo actualizado"

  /api/tournament:
    post:
      summary: Crear un nuevo torneo
      description: "Genera la estructura del torneo, grupos y partidos placeholders."
      tags:
        - Torneo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTournamentRequest"
      responses:
        "201":
          description: "Torneo creado con éxito."
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
    get:
      summary: Ver resumen del torneo (Etapas, Grupos y Equipos)
      tags:
        - Torneo
      responses:
        "200":
          description: "Visión general del torneo."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentOverviewResponse"

  /api/tournament/matches:
    get:
      summary: Listar todos los partidos del torneo
      tags:
        - Partidos
      responses:
        "200":
          description: "Lista de todos los enfrentamientos."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchResponse"

  /api/tournament/matches/{id}:
    get:
      summary: Ver detalle de un partido
      tags:
        - Partidos
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Información detallada del partido."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchResponse"

components:
  schemas:
    PreloadTeamRequest:
      type: object
      required: [playerA, playerB, contactPhone]
      properties:
        playerA: { $ref: "#/components/schemas/PlayerSchema" }
        playerB: { $ref: "#/components/schemas/PlayerSchema" }
        contactPhone: { type: string }

    UpdateTeamRequest:
      type: object
      properties:
        playerA: { $ref: "#/components/schemas/PlayerSchema" }
        playerB: { $ref: "#/components/schemas/PlayerSchema" }
        contactPhone: { type: string }
        checked_in: { type: boolean }
        groupId: { type: string, format: uuid }

    PlayerSchema:
      type: object
      properties:
        name: { type: string, example: "Juan Pérez" }
        category: { type: integer, minimum: 1, maximum: 9, example: 5 }

    TeamResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        playerA: { $ref: "#/components/schemas/PlayerSchema" }
        playerB: { $ref: "#/components/schemas/PlayerSchema" }
        contactPhone: { type: string }
        status: { type: string, enum: [preloaded, checked_in] }
        checked_in: { type: boolean }
        groupId: { type: string, format: uuid, nullable: true }

    CreateTournamentRequest:
      type: object
      required: [name, stages]
      properties:
        name: { type: string, example: "Torneo Verano 2026" }
        numberOfCourts: { type: integer, example: 3, default: 2 }
        stages:
          type: array
          items:
            $ref: "#/components/schemas/StageConfigSchema"

    StageConfigSchema:
      type: object
      required: [order, type, config]
      properties:
        order: { type: integer }
        type: { type: string, enum: [GROUP_STAGE, KNOCKOUT_STAGE] }
        config: { type: object }

    TournamentOverviewResponse:
      type: object
      properties:
        name: { type: string }
        stages:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              type: { type: string }
              groups:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    name: { type: string }
                    teams:
                      type: array
                      items:
                        $ref: "#/components/schemas/TeamMinimalResponse"

    TeamMinimalResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        playerA: { properties: { name: { type: string } } }
        playerB: { properties: { name: { type: string } } }

    MatchResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        round: { type: string }
        status: { type: string }
        courtNumber: { type: integer, nullable: true }
        startTime: { type: string, format: date-time, nullable: true }
        placeholderA: { type: string, nullable: true }
        placeholderB: { type: string, nullable: true }
        advancesToMatchId: { type: string, format: uuid, nullable: true }
        teamA:
          { $ref: "#/components/schemas/TeamMinimalResponse", nullable: true }
        teamB:
          { $ref: "#/components/schemas/TeamMinimalResponse", nullable: true }
        scoreA: { type: integer, nullable: true }
        scoreB: { type: integer, nullable: true }

    ErrorResponse:
      type: object
      properties:
        message: { type: string }
